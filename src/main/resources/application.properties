spring.application.name=pointsense

# ── Sunucu ──────────────────────────────────────────────────
# Railway PORT env var'ını otomatik alır; local'de 8080 kullanılır
server.port=${PORT:8080}

# ── PostgreSQL ───────────────────────────────────────────────
# Railway otomatik PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD verir
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:pointsense}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# update: tablo yoksa oluşturur, varsa şemayı günceller
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null

# ── RL Model ─────────────────────────────────────────────────
# Railway'de MODEL_PATH env var'ı ile model.onnx yolu verilebilir
rl.model.path=${MODEL_PATH:model.onnx}

# ── WebSocket ────────────────────────────────────────────────
spring.websocket.max-text-message-size=65536

# ── Actuator (Railway health check) ──────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── OpenAPI / Swagger ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pointsense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pointsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pointsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pointsense-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: pointsense
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
